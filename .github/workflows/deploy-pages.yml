name: Deploy to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - index.html
      - .github/workflows/deploy-pages.yml
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Inject backend URL and OWM API key
        env:
          BACKEND_URL: ${{ vars.BACKEND_URL }}
          OWM_API_KEY: ${{ secrets.OWM_API_KEY }}
        run: |
          if [ -n "$BACKEND_URL" ]; then
            BACKEND_URL="${BACKEND_URL%/}"
            sed -i "s|var CONFIGURED_BACKEND_URL = \"\";|var CONFIGURED_BACKEND_URL = \"${BACKEND_URL}\";|" index.html
            echo "Backend URL injected: ${BACKEND_URL}"
          fi
          if [ -n "$OWM_API_KEY" ]; then
            sed -i "s|var OWM_API_KEY = \"[^\"]*\";|var OWM_API_KEY = \"${OWM_API_KEY}\";|" index.html
            echo "OWM API key injected"
          else
            echo "OWM_API_KEY secret not set — only Open-Meteo will be used"
          fi

      - name: Prepare static files
        run: |
          mkdir -p dist
          cp index.html dist/

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: dist/

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
