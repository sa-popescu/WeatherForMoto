workflows:
  ios-app-store:
    name: MotoMeteo iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      node: 20
      xcode: latest
      cocoapods: default
      # ── Variabile setate în Codemagic Dashboard → Environment variables ──
      # APP_STORE_CONNECT_KEY_IDENTIFIER   (ex: A1B2C3D4E5)
      # APP_STORE_CONNECT_ISSUER_ID        (ex: 12345678-1234-...)
      # APP_STORE_CONNECT_PRIVATE_KEY      (conținutul .p8, cu \n)
      vars:
        BUNDLE_ID: ro.motometeo.app
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App
      ios_signing:
        distribution_type: app_store
        bundle_identifier: ro.motometeo.app

    integrations:
      app_store_connect: Codemagic_ASC_Integration

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Prepare web assets for Capacitor
        script: |
          rm -rf www
          mkdir -p www
          cp index.html manifest.json sw.js privacy-policy.html www/
          cp icon-192.png icon-512.png icon-apple.png www/
          cp -R icons www/

      - name: Capacitor sync iOS
        script: |
          if [ ! -d ios/App ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Set build number from Codemagic build index
        script: |
          LATEST=$(app-store-connect get-latest-build-number \
            "$BUNDLE_ID" --platform IOS 2>/dev/null || echo "0")
          agvtool new-version -all $(($LATEST + 1))
        working_directory: ios/App

      - name: Build & archive
        script: |
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME"

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Testeri interni
        submit_to_app_store: false # schimbă în true pentru release direct
