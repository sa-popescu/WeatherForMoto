workflows:
  ios-app-store:
    name: MotoMeteo iOS — App Store
    max_build_duration: 60
    instance_type: mac_mini_m2

    environment:
      groups:
        - ios_signing
        - app_store_credentials
      node: 20
      xcode: latest
      cocoapods: default
      # ── Variabile setate în Codemagic Dashboard → Environment variables ──
      # APP_STORE_CONNECT_KEY_IDENTIFIER   (ex: A1B2C3D4E5)
      # APP_STORE_CONNECT_ISSUER_ID        (ex: 12345678-1234-...)
      # APP_STORE_CONNECT_PRIVATE_KEY      (conținutul .p8, cu \n)
      # IOS_CERTIFICATE_B64                (base64 pentru ios_distribution.p12)
      # IOS_CERTIFICATE_PASSWORD           (parola fișierului .p12)
      # IOS_PROVISIONING_PROFILE_B64       (base64 pentru .mobileprovision)
      vars:
        BUNDLE_ID: ro.motometeo.app
        XCODE_WORKSPACE: ios/App/App.xcworkspace
        XCODE_SCHEME: App

    triggering:
      events:
        - push
      branch_patterns:
        - pattern: main
          include: true

    scripts:
      - name: Install npm dependencies
        script: npm install

      - name: Prepare web assets for Capacitor
        script: |
          rm -rf www
          mkdir -p www
          cp index.html manifest.json sw.js privacy-policy.html www/
          cp icon-192.png icon-512.png icon-apple.png www/
          cp -R icons www/

      - name: Capacitor sync iOS
        script: |
          if [ ! -d ios/App ]; then
            npx cap add ios
          fi
          npx cap sync ios

      - name: Install CocoaPods
        script: |
          cd ios/App
          pod install

      - name: Import signing assets
        script: |
          set -e
          CERT_INPUT="${IOS_CERTIFICATE_B64:-${IOS_CERTIFICATE:-${CM_CERTIFICATE:-}}}"
          PROFILE_INPUT="${IOS_PROVISIONING_PROFILE_B64:-${IOS_PROVISIONING_PROFILE:-${CM_PROVISIONING_PROFILE:-}}}"
          CERT_PASSWORD="${IOS_CERTIFICATE_PASSWORD:-${CM_CERTIFICATE_PASSWORD:-}}"

          if [ -z "$CERT_INPUT" ] || [ -z "$PROFILE_INPUT" ] || [ -z "$CERT_PASSWORD" ]; then
            echo "Missing signing vars. Provide one of: IOS_CERTIFICATE_B64/IOS_CERTIFICATE/CM_CERTIFICATE"
            echo "and one of: IOS_PROVISIONING_PROFILE_B64/IOS_PROVISIONING_PROFILE/CM_PROVISIONING_PROFILE"
            echo "and one of: IOS_CERTIFICATE_PASSWORD/CM_CERTIFICATE_PASSWORD"
            exit 1
          fi

          if [ -f "$CERT_INPUT" ]; then
            cp "$CERT_INPUT" /tmp/ios_distribution.p12
          else
            printf '%s' "$CERT_INPUT" | tr -d '\r\n\t ' | base64 --decode > /tmp/ios_distribution.p12
          fi

          if [ -f "$PROFILE_INPUT" ]; then
            cp "$PROFILE_INPUT" /tmp/MotoMeteo_App_Store.mobileprovision
          else
            printf '%s' "$PROFILE_INPUT" | tr -d '\r\n\t ' | base64 --decode > /tmp/MotoMeteo_App_Store.mobileprovision
          fi

          test -s /tmp/ios_distribution.p12
          test -s /tmp/MotoMeteo_App_Store.mobileprovision
          openssl pkcs12 -in /tmp/ios_distribution.p12 -nokeys -passin pass:"$CERT_PASSWORD" >/dev/null
          keychain initialize
          keychain add-certificates \
            --certificate /tmp/ios_distribution.p12 \
            --certificate-password "$CERT_PASSWORD"
          mkdir -p "$HOME/Library/MobileDevice/Provisioning Profiles"
          cp /tmp/MotoMeteo_App_Store.mobileprovision "$HOME/Library/MobileDevice/Provisioning Profiles/"
          security cms -D -i "$HOME/Library/MobileDevice/Provisioning Profiles/MotoMeteo_App_Store.mobileprovision" >/tmp/profile.plist
          /usr/libexec/PlistBuddy -c 'Print :Name' /tmp/profile.plist
          /usr/libexec/PlistBuddy -c 'Print :UUID' /tmp/profile.plist
          /usr/libexec/PlistBuddy -c 'Print :Entitlements:application-identifier' /tmp/profile.plist

      - name: Set build number from Codemagic build index
        script: |
          LATEST=$(app-store-connect get-latest-build-number \
            "$BUNDLE_ID" --platform IOS 2>/dev/null || echo "0")
          agvtool new-version -all $(($LATEST + 1))
        working_directory: ios/App

      - name: Build & archive
        script: |
          cat >/tmp/export_options.plist <<'EOF'
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key><string>app-store</string>
            <key>signingStyle</key><string>manual</string>
            <key>teamID</key><string>87QLJT4NDG</string>
            <key>provisioningProfiles</key>
            <dict>
              <key>ro.motometeo.app</key><string>MotoMeteo App Store</string>
            </dict>
          </dict>
          </plist>
          EOF
          xcode-project build-ipa \
            --workspace "$XCODE_WORKSPACE" \
            --scheme "$XCODE_SCHEME" \
            --archive-xcargs "CODE_SIGN_STYLE=Manual DEVELOPMENT_TEAM=87QLJT4NDG PROVISIONING_PROFILE_SPECIFIER='MotoMeteo App Store'" \
            --export-options-plist /tmp/export_options.plist

    artifacts:
      - build/ios/ipa/*.ipa
      - /tmp/xcodebuild_logs/*.log

    publishing:
      app_store_connect:
        api_key: $APP_STORE_CONNECT_PRIVATE_KEY
        key_id: $APP_STORE_CONNECT_KEY_IDENTIFIER
        issuer_id: $APP_STORE_CONNECT_ISSUER_ID
        submit_to_testflight: true
        beta_groups:
          - Testeri interni
        submit_to_app_store: false # schimbă în true pentru release direct
