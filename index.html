<!DOCTYPE html>

<html lang="ro">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>MotoMeteo — Vremea pentru motocicliști</title>
  <link
    href="https://fonts.googleapis.com/css2?family=Rajdhani:wght@500;600;700&family=Inter:wght@400;500;600&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['Rajdhani', 'sans-serif'],
            body: ['Inter', 'sans-serif'],
          },
          colors: {
            bg: '#0b0c0f',
            surface: '#13151a',
            card: '#181b22',
            border: '#232731',
            accent: '#f97316',
            danger: '#ef4444',
            warn: '#eab308',
            ok: '#22c55e',
            muted: '#6b7280',
          },
        },
      },
    };
  </script>
  <style>
    @keyframes spin-slow {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes pulse-soft {

      0%,
      100% {
        opacity: 1;
      }

      50% {
        opacity: .55;
      }
    }

    .spin-anim {
      animation: spin-slow 1.2s linear infinite;
      display: inline-block;
    }

    .pulse-anim {
      animation: pulse-soft 1.8s ease-in-out infinite;
    }

    .gauge-ring {
      transition: stroke-dashoffset .6s cubic-bezier(.4, 0, .2, 1);
    }

    .scroll-x::-webkit-scrollbar {
      height: 4px;
    }

    .scroll-x::-webkit-scrollbar-track {
      background: transparent;
    }

    .scroll-x::-webkit-scrollbar-thumb {
      background: #232731;
      border-radius: 2px;
    }

    .wx-icon {
      font-size: 4rem;
      line-height: 1;
    }

    .wx-icon-lg {
      font-size: 6.5rem;
      line-height: 1;
    }

    #tempChart {
      width: 100% !important;
      height: 190px !important;
    }

    html {
      scroll-behavior: smooth;
    }

    /* Card hover lift */
    .wx-card {
      transition: transform 0.18s ease, border-color 0.18s ease, box-shadow 0.18s ease;
    }

    .wx-card:hover {
      transform: translateY(-3px);
      box-shadow: 0 6px 24px rgba(0, 0, 0, 0.35);
    }

    /* Gauge glow based on score */
    .gauge-glow-ok {
      filter: drop-shadow(0 0 14px rgba(34, 197, 94, 0.45));
    }

    .gauge-glow-warn {
      filter: drop-shadow(0 0 14px rgba(249, 115, 22, 0.45));
    }

    .gauge-glow-caution {
      filter: drop-shadow(0 0 14px rgba(234, 179, 8, 0.45));
    }

    .gauge-glow-danger {
      filter: drop-shadow(0 0 14px rgba(239, 68, 68, 0.45));
    }

    /* Skeleton shimmer */
    @keyframes skeleton-shimmer {
      0% {
        background-position: -200% 0;
      }

      100% {
        background-position: 200% 0;
      }
    }

    .skeleton {
      background: linear-gradient(90deg, #181b22 25%, #232731 50%, #181b22 75%);
      background-size: 200% 100%;
      animation: skeleton-shimmer 1.6s ease-in-out infinite;
      border-radius: 0.75rem;
    }

    /* Auto-refresh countdown pill */
    .refresh-pill {
      font-size: 0.65rem;
      letter-spacing: 0.08em;
      opacity: 0.7;
      transition: opacity 0.3s;
    }

    .refresh-pill:hover {
      opacity: 1;
    }

    /* Hourly card active "ACUM" glow */
    .hourly-now {
      box-shadow: 0 0 0 2px rgba(249, 115, 22, 0.35), 0 4px 16px rgba(249, 115, 22, 0.15);
    }

    /* Arrow toggle for daily expand */
    .day-arrow {
      transition: transform 0.25s cubic-bezier(.4, 0, .2, 1);
      display: inline-block;
      font-size: 0.65rem;
      opacity: 0.5;
    }

    .day-arrow.open {
      transform: rotate(180deg);
      opacity: 0.9;
    }

    /* Score bar in hourly */
    .score-bar-track {
      background: #232731;
      border-radius: 4px;
      overflow: hidden;
      height: 5px;
    }

    .score-bar-fill {
      height: 100%;
      border-radius: 4px;
      transition: width 0.5s cubic-bezier(.4, 0, .2, 1);
    }
  </style>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.3/dist/chart.umd.min.js"></script>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#0b0c0f">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="MotoMeteo">
</head>

<body class="bg-bg text-gray-100 font-body min-h-screen overflow-x-hidden">

  <!-- HEADER -->
  <header class="bg-surface border-b border-border sticky top-0 z-50">
    <div class="max-w-5xl mx-auto px-3 sm:px-4 py-2 sm:py-3 flex items-center justify-between gap-2 sm:gap-4 flex-wrap">
      <div class="flex items-center gap-2 sm:gap-3">
        <span class="text-3xl sm:text-4xl leading-none">🏍️</span>
        <div>
          <div class="font-display text-2xl sm:text-3xl font-bold tracking-widest text-accent leading-none">MOTO<span
              class="text-gray-600 text-xl sm:text-2xl"> /// </span>METEO</div>
          <div id="upd" class="text-xs text-muted tracking-widest mt-0.5">—</div>
        </div>
      </div>
      <div class="flex gap-1.5 sm:gap-2 items-center">
        <input id="city-in" type="text" placeholder="Caută oraș..." value="Bucharest" class="bg-bg border border-border text-gray-100 font-body text-sm px-2 sm:px-3 py-1.5 sm:py-2 rounded-lg w-32 sm:w-44
                      focus:outline-none focus:border-accent placeholder-muted transition-colors" />
        <button onclick="searchCity()" class="bg-accent hover:bg-orange-400 text-black font-display font-bold text-sm sm:text-base tracking-wider
                       px-3 sm:px-4 py-1.5 sm:py-2 rounded-lg transition-colors">CAUTĂ</button>
        <button onclick="geolocate()" title="Locația mea" class="bg-card border border-border text-muted hover:text-accent hover:border-accent
                       text-base px-2.5 sm:px-3 py-1.5 sm:py-2 rounded-lg transition-colors">📍</button>
        <button onclick="loadWeather()" title="Reîncarcă" class="bg-card border border-border text-muted hover:text-gray-200 hover:border-gray-500
                       text-base px-2.5 sm:px-3 py-1.5 sm:py-2 rounded-lg transition-colors">↻</button>
      </div>
    </div>
    <div id="favs-bar" class="max-w-5xl mx-auto px-3 sm:px-4 pb-2"></div>
  </header>

  <!-- MAIN -->
  <main class="max-w-5xl mx-auto px-3 sm:px-4 py-6 min-w-0" id="app">
  </main>

  <script>
    // ---------------------------------------------------------------------------
    // Backend URL configuration
    // ---------------------------------------------------------------------------
    // When the frontend is served directly by the FastAPI/Railway backend,
    // an empty string causes the browser to use relative URLs (same origin) –
    // no configuration needed.
    //
    // When the frontend is served from a different host (e.g. GitHub Pages),
    // set a custom URL here OR the user can enter it in the error banner that
    // appears on failure (it is then stored in localStorage for future visits).
    //
    //   Example:  var CONFIGURED_BACKEND_URL = "https://your-app.up.railway.app";
    var CONFIGURED_BACKEND_URL = "";
    var OWM_API_KEY = "3e17019022d624b5b3d26b54f7c6b8a5"; // default key; overridable via GH Actions secret OWM_API_KEY

    function _resolveApiUrl() {
      if (location.protocol === 'file:') {
        return localStorage.getItem('motoMeteoBackendUrl') || "http://localhost:8000";
      }
      if (CONFIGURED_BACKEND_URL) return CONFIGURED_BACKEND_URL.replace(/\/$/, '');
      var stored = localStorage.getItem('motoMeteoBackendUrl');
      if (stored) return stored.replace(/\/$/, '');
      // On GitHub Pages the backend is on a different host — return null to
      // trigger the configuration UI instead of a failing relative request.
      if (location.hostname.endsWith('.github.io')) return null;
      // Default: relative URL (works when served by the FastAPI backend directly)
      return "";
    }
    var API_URL = _resolveApiUrl();

    var LAT = 44.4268, LON = 26.1025, CITY = "București";
    var _chart = null;
    var DAYS = ["Duminică", "Luni", "Marți", "Miercuri", "Joi", "Vineri", "Sâmbătă"];
    var _autoRefreshTimer = null;
    var _refreshSecondsLeft = 0;
    var AUTO_REFRESH_SEC = 1800; // 30 minutes

    function startAutoRefresh() {
      if (_autoRefreshTimer) clearInterval(_autoRefreshTimer);
      _refreshSecondsLeft = AUTO_REFRESH_SEC;
      _autoRefreshTimer = setInterval(function () {
        _refreshSecondsLeft--;
        var pill = document.getElementById('refresh-pill');
        if (pill) {
          var m = Math.ceil(_refreshSecondsLeft / 60);
          pill.textContent = '↻ auto în ' + m + 'm';
        }
        if (_refreshSecondsLeft <= 0) loadWeather();
      }, 1000);
    }
    var BACKEND_UNAVAILABLE_MSG = "Nu se poate conecta la backend. Asigură-te că serverul rulează.";

    function rainCls(p) { return p > 60 ? "text-danger" : p > 30 ? "text-warn" : "text-muted"; }
    function windCls(g) { return g > 50 ? "text-danger" : g > 35 ? "text-warn" : "text-gray-100"; }
    function tempCls(t) { return t < 5 ? "text-danger" : t > 32 ? "text-warn" : "text-gray-100"; }
    function aqiCls(a) { return a >= 4 ? "text-danger" : a >= 3 ? "text-warn" : "text-ok"; }
    function aqiLabel(a) { return ["—", "Bun", "Acceptabil", "Moderat", "Rău", "Foarte rău"][a] || "—"; }

    function scoreHourly(feels, gusts, prec, code) {
      var s = 100;
      if (prec > 5) s -= 50; else if (prec > 1) s -= 30; else if (prec > 0.2) s -= 15;
      if ([95, 96, 99].indexOf(code) > -1) s -= 40;
      if (gusts > 70) s -= 30; else if (gusts > 50) s -= 15; else if (gusts > 35) s -= 8;
      if (feels < 5) s -= 25; else if (feels < 10) s -= 12; else if (feels > 36) s -= 10;
      if ([45, 48].indexOf(code) > -1) s -= 20;
      return Math.max(0, Math.min(100, Math.round(s)));
    }

    function scoreInfo(s) {
      if (s >= 80) return { label: "IDEAL PENTRU MERS", color: "#22c55e", cls: "text-ok", msg: "Condiții excelente. Drum liber! 🏍️" };
      if (s >= 60) return { label: "ACCEPTABIL", color: "#f97316", cls: "text-accent", msg: "Condiții bune, atenție la schimbări." };
      if (s >= 40) return { label: "CU PRECAUȚIE", color: "#eab308", cls: "text-warn", msg: "Mergi cu atenție sporită." };
      return { label: "NU RECOMAND", color: "#ef4444", cls: "text-danger", msg: "Condiții periculoase pentru două roți." };
    }

    function fmtTime(iso) {
      if (!iso) return "—";
      var d = new Date(iso);
      return d.getHours().toString().padStart(2, "0") + ":" + d.getMinutes().toString().padStart(2, "0");
    }
    function uvCls(uv) { return uv >= 8 ? "text-danger" : uv >= 5 ? "text-warn" : uv >= 3 ? "text-accent" : "text-ok"; }
    function uvDesc(uv) {
      if (uv >= 8) return "Foarte ridicat — protecție maximă";
      if (uv >= 6) return "Ridicat — aplicați protecție solară";
      if (uv >= 3) return "Moderat";
      return "Scăzut";
    }

    function verdictBadge(s) {
      if (s >= 75) return '<span class="inline-block px-2 sm:px-3 py-0.5 sm:py-1 rounded-md text-xs font-semibold sm:tracking-widest bg-ok/15 text-ok whitespace-nowrap">✓ OK</span>';
      if (s >= 45) return '<span class="inline-block px-2 sm:px-3 py-0.5 sm:py-1 rounded-md text-xs font-semibold sm:tracking-widest bg-warn/15 text-warn whitespace-nowrap"><span class="hidden sm:inline">⚠ PRECAUȚIE</span><span class="sm:hidden">⚠</span></span>';
      return '<span class="inline-block px-2 sm:px-3 py-0.5 sm:py-1 rounded-md text-xs font-semibold sm:tracking-widest bg-danger/15 text-danger whitespace-nowrap"><span class="hidden sm:inline">✗ EVITĂ</span><span class="sm:hidden">✗</span></span>';
    }

    function gaugeHtml(score, color) {
      var r = 54, cx = 64, cy = 64;
      var circ = 2 * Math.PI * r;
      var dash = circ * (score / 100);
      var gap = circ - dash;
      return '<svg viewBox="0 0 128 128" class="w-40 h-40 -rotate-90 drop-shadow-lg">'
        + '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="#232731" stroke-width="10"/>'
        + '<circle cx="' + cx + '" cy="' + cy + '" r="' + r + '" fill="none" stroke="' + color + '" stroke-width="10"'
        + ' stroke-linecap="round" stroke-dasharray="' + dash + ' ' + gap + '" class="gauge-ring"/>'
        + '</svg>';
    }

    // -----------------------------------------------------------------------
    // WMO code helpers (mirror of weather_service.py)
    // -----------------------------------------------------------------------
    var WMO_MAP = {
      0: ["Cer senin", "☀️"], 1: ["Predominant senin", "🌤️"], 2: ["Parțial înnorat", "⛅"],
      3: ["Înnorat", "☁️"], 45: ["Ceață", "🌫️"], 48: ["Ceață cu chiciură", "🌫️"],
      51: ["Burniță ușoară", "🌦️"], 53: ["Burniță moderată", "🌦️"], 55: ["Burniță densă", "🌧️"],
      61: ["Ploaie ușoară", "🌧️"], 63: ["Ploaie moderată", "🌧️"], 65: ["Ploaie torențială", "🌧️"],
      71: ["Ninsoare ușoară", "🌨️"], 73: ["Ninsoare moderată", "❄️"], 75: ["Ninsoare puternică", "❄️"],
      80: ["Averse ușoare", "🌦️"], 81: ["Averse moderate", "🌧️"], 82: ["Averse violente", "⛈️"],
      95: ["Furtună", "⛈️"], 96: ["Furtună cu grindină", "⛈️"], 99: ["Furtună puternică cu grindină", "⛈️"],
    };
    function wmoDesc(c) { return ((WMO_MAP[c] || [])[0]) || "—"; }
    function wmoIcon(c) { return ((WMO_MAP[c] || [])[1]) || "🌡️"; }
    function windDirLabel(deg) {
      if (deg == null) return "—";
      return ["N", "NE", "E", "SE", "S", "SV", "V", "NV"][Math.round(deg / 45) % 8];
    }
    function beaufortScale(kmh) {
      if (kmh == null) return "—";
      var mps = kmh / 3.6;
      var sc = [0.3, 1.5, 3.4, 5.4, 7.9, 10.7, 13.8, 17.1, 20.7, 24.4, 28.4, 32.6];
      for (var i = 0; i < sc.length; i++) if (mps < sc[i]) return String(i);
      return "12";
    }
    function motoLabel(s) {
      if (s >= 80) return "IDEAL"; if (s >= 60) return "OK";
      if (s >= 40) return "ACCEPTABIL"; if (s >= 20) return "RISCANT"; return "EVITĂ";
    }
    function omSafe(lst, i) { return (lst && i < lst.length) ? lst[i] : null; }

    // SVG compass rose with directional arrow
    function windCompassSvg(deg) {
      if (deg == null) return '';
      // Arrow points FROM where wind comes; rotate so 0° = North (up)
      var arrowRad = (deg - 90) * Math.PI / 180;
      var cos = Math.cos(arrowRad), sin = Math.sin(arrowRad);
      var tx = 12 + 8 * cos, ty = 12 + 8 * sin; // tip (direction wind goes TO)
      var tx1 = 12 - 5 * cos, ty1 = 12 - 5 * sin; // tail
      return '<svg viewBox="0 0 24 24" class="inline-block w-5 h-5 align-middle" style="vertical-align:middle;flex-shrink:0">'
        + '<circle cx="12" cy="12" r="10" fill="none" stroke="#2d3344" stroke-width="1.5"/>'
        + '<text x="12" y="5.2" text-anchor="middle" dominant-baseline="middle" fill="#4b5563" font-size="3.5" font-family="Inter,sans-serif" font-weight="600">N</text>'
        + '<text x="12" y="20.5" text-anchor="middle" dominant-baseline="middle" fill="#374151" font-size="3.5" font-family="Inter,sans-serif">S</text>'
        + '<text x="20.5" y="12.5" text-anchor="middle" dominant-baseline="middle" fill="#374151" font-size="3.5" font-family="Inter,sans-serif">E</text>'
        + '<text x="3.5" y="12.5" text-anchor="middle" dominant-baseline="middle" fill="#374151" font-size="3.5" font-family="Inter,sans-serif">V</text>'
        + '<line x1="' + tx1.toFixed(2) + '" y1="' + ty1.toFixed(2) + '" x2="' + tx.toFixed(2) + '" y2="' + ty.toFixed(2) + '" stroke="#f97316" stroke-width="2" stroke-linecap="round"/>'
        + '<circle cx="' + tx.toFixed(2) + '" cy="' + ty.toFixed(2) + '" r="1.8" fill="#f97316"/>'
        + '</svg>';
    }

    // Skeleton loading layout
    function skeletonHtml() {
      var col = '<div class="skeleton h-28 flex-1 rounded-xl"></div>';
      var card = '<div class="skeleton w-24 h-32 flex-shrink-0 rounded-xl"></div>';
      return '<div class="space-y-5 py-2">'
        + '<div class="skeleton h-14 w-72 rounded-xl"></div>'
        + '<div class="skeleton h-52 w-full rounded-2xl"></div>'
        + '<div class="grid grid-cols-2 sm:grid-cols-4 gap-3">' + col + col + col + col + '</div>'
        + '<div class="skeleton h-48 w-full rounded-xl"></div>'
        + '<div class="flex gap-3 overflow-hidden">' + card + card + card + card + card + '</div>'
        + '<div class="space-y-3">'
        + '<div class="skeleton h-14 w-full rounded-xl"></div>'.repeat(3)
        + '</div>'
        + '</div>';
    }

    function gaugeGlowCls(score) {
      if (score >= 80) return 'gauge-glow-ok';
      if (score >= 60) return 'gauge-glow-warn';
      if (score >= 40) return 'gauge-glow-caution';
      return 'gauge-glow-danger';
    }

    // MET Norway (api.met.no) symbol → WMO code
    var MET_SYMBOL_WMO = {
      clearsky: 0, fair: 1, partlycloudy: 2, cloudy: 3, fog: 45,
      lightrainshowers: 80, rainshowers: 81, heavyrainshowers: 82,
      lightrainshowersandthunder: 95, rainshowersandthunder: 95, heavyrainshowersandthunder: 99,
      lightsleetshowers: 80, sleetshowers: 81, heavysleetshowers: 82,
      lightsnowshowers: 71, snowshowers: 73, heavysnowshowers: 75,
      lightsnowshowersandthunder: 95, snowshowersandthunder: 95, heavysnowshowersandthunder: 99,
      lightrain: 61, rain: 63, heavyrain: 65,
      lightrainandthunder: 95, rainandthunder: 95, heavyrainandthunder: 95,
      lightsleet: 61, sleet: 63, heavysleet: 65,
      lightsleetandthunder: 95, sleetandthunder: 95, heavysleetandthunder: 99,
      lightsnow: 71, snow: 73, heavysnow: 75,
      lightsnowandthunder: 95, snowandthunder: 95, heavysnowandthunder: 99,
    };
    function metSymToWmo(sym) {
      if (!sym) return null;
      var v = MET_SYMBOL_WMO[sym.replace(/_day$|_night$|_polartwilight$/, '')];
      return v !== undefined ? v : null;
    }
    async function geocodeDirect(city) {
      var resp = await fetch(
        "https://geocoding-api.open-meteo.com/v1/search?name=" +
        encodeURIComponent(city) + "&count=1&language=ro"
      );
      if (!resp.ok) throw new Error("Geocoding eșuat: HTTP " + resp.status);
      var data = await resp.json();
      if (!data.results || !data.results.length)
        throw new Error("Orașul '" + city + "' nu a fost găsit.");
      var r = data.results[0];
      return {
        lat: r.latitude, lon: r.longitude, name: r.name,
        country: r.country_code || "", timezone: r.timezone || "auto"
      };
    }

    // -----------------------------------------------------------------------
    // OWM direct helpers
    // -----------------------------------------------------------------------
    function _wavg(vals, weights) {
      var tw = 0, tv = 0;
      for (var i = 0; i < vals.length; i++) {
        if (vals[i] != null) { tv += vals[i] * weights[i]; tw += weights[i]; }
      }
      return tw ? Math.round(tv / tw * 100) / 100 : null;
    }
    function owmIdToWmo(id) {
      if (id >= 200 && id < 300) return 95;
      if (id >= 300 && id < 400) return 53;
      if (id === 500) return 61; if (id === 501) return 63; if (id >= 500 && id < 510) return 65;
      if (id >= 510 && id < 600) return 80;
      if (id === 600) return 71; if (id === 601) return 73; if (id >= 600 && id < 700) return 75;
      if (id >= 700 && id < 800) return 45;
      if (id === 800) return 0; if (id === 801) return 1; if (id === 802) return 2;
      return 3;
    }
    async function fetchOWMDirect(lat, lon, key) {
      try {
        var base = "https://api.openweathermap.org";
        var p = "lat=" + lat + "&lon=" + lon + "&appid=" + key + "&units=metric&lang=ro";
        var results = await Promise.allSettled([
          fetch(base + "/data/2.5/weather?" + p),
          fetch(base + "/data/2.5/forecast?" + p + "&cnt=40"),
          fetch(base + "/data/2.5/air_pollution?lat=" + lat + "&lon=" + lon + "&appid=" + key),
        ]);
        var cur = results[0].status === "fulfilled" && results[0].value.ok ? await results[0].value.json() : null;
        var fc = results[1].status === "fulfilled" && results[1].value.ok ? await results[1].value.json() : null;
        var air = results[2].status === "fulfilled" && results[2].value.ok ? await results[2].value.json() : null;
        return { current: cur, forecast: fc, air: air };
      } catch (_) { return { current: null, forecast: null, air: null }; }
    }

    async function fetchMET(lat, lon) {
      // MET Norway Locationforecast 2.0 — free, no key, CORS supported, ECMWF model
      try {
        var resp = await fetch(
          "https://api.met.no/weatherapi/locationforecast/2.0/compact?" +
          "lat=" + lat.toFixed(4) + "&lon=" + lon.toFixed(4)
        );
        if (!resp.ok) return null;
        return await resp.json();
      } catch (_) { return null; }
    }

    async function fetchDirect(lat, lon, cityName) {
      var params = new URLSearchParams({
        latitude: lat, longitude: lon,
        current: "temperature_2m,apparent_temperature,relative_humidity_2m,wind_speed_10m,"
          + "wind_gusts_10m,wind_direction_10m,precipitation,weather_code,surface_pressure,visibility",
        hourly: "temperature_2m,apparent_temperature,precipitation_probability,"
          + "precipitation,weather_code,wind_speed_10m,wind_gusts_10m,uv_index",
        daily: "weather_code,temperature_2m_max,temperature_2m_min,apparent_temperature_max,"
          + "apparent_temperature_min,precipitation_sum,wind_speed_10m_max,wind_gusts_10m_max,"
          + "precipitation_probability_max,sunrise,sunset",
        timezone: "auto", forecast_days: 7, wind_speed_unit: "kmh",
      });
      var [omResp, owm, metData] = await Promise.all([
        fetch("https://api.open-meteo.com/v1/forecast?" + params),
        OWM_API_KEY ? fetchOWMDirect(lat, lon, OWM_API_KEY) : Promise.resolve({ current: null, forecast: null, air: null }),
        fetchMET(lat, lon),
      ]);
      if (!omResp.ok) throw new Error("Open-Meteo HTTP " + omResp.status);
      var om = await omResp.json();
      if (om.error) throw new Error("Open-Meteo: " + (om.reason || "eroare"));
      var owmCur = owm.current, owmFc = owm.forecast, owmAir = owm.air;
      var metSeries = metData && metData.properties ? metData.properties.timeseries || [] : [];
      var met0 = metSeries[0] || null;
      var metInst = met0 ? (met0.data.instant.details || {}) : {};
      var met1h = met0 ? (met0.data.next_1_hours || met0.data.next_6_hours || {}) : {};

      // ---- current: weighted merge of 3 sources (OM + OWM + MET Norway) ----
      var c = om.current || {};
      var metWind = metInst.wind_speed != null ? metInst.wind_speed * 3.6 : null;
      var metGust = metInst.wind_speed_of_gust != null ? metInst.wind_speed_of_gust * 3.6 : null;
      var metPrecCur = met1h.details ? (met1h.details.precipitation_amount || 0) : 0;
      var metCode = met1h.summary ? metSymToWmo(met1h.summary.symbol_code) : null;

      var temp = _wavg([c.temperature_2m, owmCur ? owmCur.main.temp : null, metInst.air_temperature], [1, 1, 1.2]);
      var feels = _wavg([c.apparent_temperature, owmCur ? owmCur.main.feels_like : null], [1, 1]);
      var humidity = _wavg([c.relative_humidity_2m, owmCur ? owmCur.main.humidity : null, metInst.relative_humidity], [1, 1, 1]);
      var windSpeed = _wavg([c.wind_speed_10m, owmCur ? owmCur.wind.speed * 3.6 : null, metWind], [1, 1, 1.2]);
      var windGusts = _wavg([c.wind_gusts_10m, owmCur ? (owmCur.wind.gust || owmCur.wind.speed) * 3.6 : null, metGust], [1.2, 0.8, 1.2]);
      var prec = _wavg([c.precipitation || 0, owmCur ? ((owmCur.rain && owmCur.rain["1h"]) || 0) : null, metPrecCur], [1, 1, 1.2]) || 0;
      var omCode = c.weather_code;
      var owmCode = owmCur ? owmIdToWmo(owmCur.weather[0].id) : null;
      // Use most severe code across all sources (safety-first for motorcyclists)
      var allCodes = [omCode, owmCode, metCode].filter(function (x) { return x != null; });
      var finalCode = allCodes.length ? allCodes.reduce(function (a, b) { return b > a ? b : a; }) : 0;
      var description = owmCur
        ? owmCur.weather[0].description.charAt(0).toUpperCase() + owmCur.weather[0].description.slice(1)
        : wmoDesc(finalCode);
      var pressure = owmCur ? owmCur.main.pressure : (metInst.air_pressure_at_sea_level || c.surface_pressure);
      var visKm = owmCur && owmCur.visibility != null
        ? Math.round(owmCur.visibility / 100) / 10
        : (c.visibility != null ? Math.round(c.visibility / 100) / 10 : null);
      var aqi = owmAir && owmAir.list && owmAir.list.length ? owmAir.list[0].main.aqi : null;
      var motoScore = scoreHourly(feels, windGusts, prec, finalCode);
      var sources = ["open-meteo"];
      if (owmCur) sources.push("openweathermap");
      if (met0) sources.push("met-norway");
      var current = {
        temperature: temp, feels_like: feels, humidity: humidity,
        wind_speed_kmh: windSpeed, wind_gusts_kmh: windGusts,
        wind_direction_deg: c.wind_direction_10m, wind_direction: windDirLabel(c.wind_direction_10m),
        beaufort: beaufortScale(windSpeed), precipitation_mm: prec,
        weather_code: finalCode, description: description, icon: wmoIcon(finalCode),
        pressure_hpa: pressure, visibility_km: visKm, aqi: aqi,
        moto_score: motoScore, moto_label: motoLabel(motoScore), sources: sources,
      };

      // ---- build MET lookups by date and by time (normalize to YYYY-MM-DDTHH:MM) ----
      var metByDate = {}, metByTime = {};
      metSeries.forEach(function (ts) {
        var d = ts.time.slice(0, 10);
        (metByDate[d] = metByDate[d] || []).push(ts);
        metByTime[ts.time.slice(0, 16)] = ts;
      });

      // ---- daily: merge Open-Meteo daily with OWM 3h + MET hourly ----
      var daily = [];
      var dd = om.daily || {};
      var dates = dd.time || [];
      var owmByDate = {};
      if (owmFc && owmFc.list) {
        owmFc.list.forEach(function (it) {
          var d = it.dt_txt.slice(0, 10);
          (owmByDate[d] = owmByDate[d] || []).push(it);
        });
      }
      for (var i = 0; i < dates.length; i++) {
        var dcode = omSafe(dd.weather_code, i);
        var tMax = omSafe(dd.temperature_2m_max, i);
        var tMin = omSafe(dd.temperature_2m_min, i);
        var famax = omSafe(dd.apparent_temperature_max, i);
        var famin = omSafe(dd.apparent_temperature_min, i);
        var gustMax = omSafe(dd.wind_gusts_10m_max, i);
        var precSum = omSafe(dd.precipitation_sum, i) || 0;
        var owmItems = owmByDate[dates[i]] || [];
        var metItems = metByDate[dates[i]] || [];
        if (owmItems.length) {
          var owmTemps = owmItems.map(function (x) { return x.main.temp; });
          var owmFeels = owmItems.map(function (x) { return x.main.feels_like; });
          tMax = _wavg([tMax, Math.max.apply(null, owmTemps)], [1, 1]);
          tMin = _wavg([tMin, Math.min.apply(null, owmTemps)], [1, 1]);
          famax = _wavg([famax, Math.max.apply(null, owmFeels)], [1, 1]);
          famin = _wavg([famin, Math.min.apply(null, owmFeels)], [1, 1]);
          var precOwm = owmItems.reduce(function (s, x) { return s + ((x.rain && x.rain["3h"]) || 0) + ((x.snow && x.snow["3h"]) || 0); }, 0);
          precSum = _wavg([precSum, precOwm], [1, 1]) || 0;
          var gustOwm = Math.max.apply(null, owmItems.map(function (x) { return (x.wind.gust || x.wind.speed) * 3.6; }));
          gustMax = _wavg([gustMax, gustOwm], [1.2, 0.8]);
          var codeFreq = {}, modeCode = dcode;
          owmItems.forEach(function (x) {
            var wc = owmIdToWmo(x.weather[0].id);
            codeFreq[wc] = (codeFreq[wc] || 0) + 1;
            if (codeFreq[wc] > (codeFreq[modeCode] || 0)) modeCode = wc;
          });
          dcode = modeCode;
        }
        if (metItems.length) {
          var metTempsD = metItems.map(function (ts) { return ts.data.instant.details.air_temperature; }).filter(function (x) { return x != null; });
          var metGustsD = metItems.map(function (ts) { var g = ts.data.instant.details.wind_speed_of_gust, w = ts.data.instant.details.wind_speed; return (g || w) != null ? (g || w) * 3.6 : null; }).filter(function (x) { return x != null; });
          var metPrecD = metItems.reduce(function (s, ts) { var p = ts.data.next_1_hours || ts.data.next_6_hours; return s + (p && p.details ? (p.details.precipitation_amount || 0) : 0); }, 0);
          if (metTempsD.length) {
            tMax = _wavg([tMax, Math.max.apply(null, metTempsD)], [1, 1.2]);
            tMin = _wavg([tMin, Math.min.apply(null, metTempsD)], [1, 1.2]);
          }
          if (metGustsD.length) gustMax = _wavg([gustMax, Math.max.apply(null, metGustsD)], [1, 1.2]);
          precSum = _wavg([precSum, metPrecD], [1, 1.2]) || 0;
          var metDayCodes = metItems.map(function (ts) { var p = ts.data.next_1_hours || ts.data.next_6_hours; return p && p.summary ? metSymToWmo(p.summary.symbol_code) : null; }).filter(function (x) { return x != null; });
          if (metDayCodes.length) { var metMax = metDayCodes.reduce(function (a, b) { return b > a ? b : a; }); if (metMax > dcode) dcode = metMax; }
        }
        var ds = scoreHourly(famax, gustMax, precSum, dcode);
        daily.push({
          date: dates[i], weather_code: dcode, icon: wmoIcon(dcode), description: wmoDesc(dcode),
          temp_max: tMax, temp_min: tMin, feels_max: famax, feels_min: famin,
          precipitation_mm: Math.round(precSum * 10) / 10,
          precipitation_probability: omSafe(dd.precipitation_probability_max, i) || 0,
          wind_max_kmh: omSafe(dd.wind_speed_10m_max, i), wind_gusts_kmh: gustMax,
          moto_score: ds, moto_label: motoLabel(ds),
          sunrise: omSafe(dd.sunrise, i), sunset: omSafe(dd.sunset, i),
        });
      }

      // ---- hourly: Open-Meteo 1h merged with MET Norway where available ----
      var hourly = [];
      var hh = om.hourly || {};
      var times = hh.time || [];
      for (var i = 0; i < times.length; i++) {
        var hcode = omSafe(hh.weather_code, i);
        var metH = metByTime[times[i]] || null;
        var metHInst = metH ? (metH.data.instant.details || {}) : {};
        var metH1h = metH ? (metH.data.next_1_hours || metH.data.next_6_hours || {}) : {};
        var metHCode = metH1h.summary ? metSymToWmo(metH1h.summary.symbol_code) : null;
        var hfinalCode = (metHCode != null && metHCode > hcode) ? metHCode : hcode;
        hourly.push({
          time: times[i],
          temperature: _wavg([omSafe(hh.temperature_2m, i), metHInst.air_temperature], [1, 1.2]),
          feels_like: omSafe(hh.apparent_temperature, i),
          precipitation_mm: _wavg([omSafe(hh.precipitation, i), metH1h.details ? (metH1h.details.precipitation_amount || 0) : null], [1, 1.2]),
          precipitation_probability: omSafe(hh.precipitation_probability, i),
          wind_speed_kmh: _wavg([omSafe(hh.wind_speed_10m, i), metHInst.wind_speed != null ? metHInst.wind_speed * 3.6 : null], [1, 1.2]),
          wind_gusts_kmh: _wavg([omSafe(hh.wind_gusts_10m, i), metHInst.wind_speed_of_gust != null ? metHInst.wind_speed_of_gust * 3.6 : null], [1, 1.2]),
          weather_code: hfinalCode, icon: wmoIcon(hfinalCode), description: wmoDesc(hfinalCode),
          uv_index: omSafe(hh.uv_index, i),
        });
      }

      // ---- enrich current with UV + frost risk from hourly data ----
      var nowIso = new Date().toISOString().slice(0, 13);
      var uvNow = null;
      for (var j = 0; j < hourly.length; j++) {
        if (hourly[j].time.slice(0, 13) >= nowIso) { uvNow = hourly[j].uv_index; break; }
      }
      current.uv_index = uvNow;
      current.frost_risk = (temp != null && temp < 4 && humidity != null && humidity > 75);

      return {
        city: cityName, latitude: lat, longitude: lon,
        timezone: om.timezone || "UTC", current: current, daily: daily, hourly: hourly
      };
    }

    function geolocate() {
      if (!navigator.geolocation) { alert("Geolocalizare indisponibilă în acest browser."); return; }
      var btn = document.querySelector('button[onclick="geolocate()"]');
      if (btn) btn.textContent = "⏳";
      navigator.geolocation.getCurrentPosition(function (pos) {
        LAT = pos.coords.latitude;
        LON = pos.coords.longitude;
        CITY = "Locația mea";
        // Reverse geocode via Nominatim (OpenStreetMap)
        fetch("https://nominatim.openstreetmap.org/reverse?lat=" + LAT + "&lon=" + LON + "&format=json")
          .then(function (r) { return r.json(); })
          .then(function (d) {
            var a = d.address || {};
            CITY = a.city || a.town || a.village || a.county || "Locația mea";
            document.getElementById("city-in").value = CITY;
            if (btn) btn.textContent = "📍";
            loadWeather();
          }).catch(function () { if (btn) btn.textContent = "📍"; loadWeather(); });
      }, function () {
        if (btn) btn.textContent = "📍";
        alert("Nu am putut obține locația. Verifică permisiunile browserului.");
      });
    }

    // Favourite / recent cities (localStorage)
    // -----------------------------------------------------------------------
    var MAX_FAVS = 5;
    function _getFavs() {
      try { return JSON.parse(localStorage.getItem("motoFavs") || "[]"); } catch (_) { return []; }
    }
    function _saveFavs(list) { localStorage.setItem("motoFavs", JSON.stringify(list)); }
    function saveCity() {
      if (!CITY || CITY === "Locația mea") return;
      var favs = _getFavs().filter(function (f) { return f.name !== CITY; });
      favs.unshift({ name: CITY, lat: LAT, lon: LON });
      _saveFavs(favs.slice(0, MAX_FAVS));
    }
    function loadFav(name, lat, lon) {
      CITY = name; LAT = lat; LON = lon;
      document.getElementById("city-in").value = name;
      loadWeather();
    }
    function removeFav(name) {
      _saveFavs(_getFavs().filter(function (f) { return f.name !== name; }));
      renderFavsBar();
    }
    function renderFavsBar() {
      var el = document.getElementById("favs-bar");
      if (!el) return;
      var favs = _getFavs();
      if (!favs.length) { el.innerHTML = ""; return; }
      var html = '<div class="flex gap-2 flex-wrap items-center">';
      html += '<span class="text-xs text-muted tracking-widest mr-1">★</span>';
      favs.forEach(function (f) {
        html += '<span class="flex items-center gap-0.5 bg-card border border-border rounded-lg text-xs">';
        html += '<button onclick="loadFav(' + JSON.stringify(f.name) + ',' + f.lat + ',' + f.lon + ')"'
          + ' class="px-2 py-1 text-gray-300 hover:text-accent transition-colors">' + f.name + '</button>';
        html += '<button onclick="removeFav(' + JSON.stringify(f.name) + ')"'
          + ' class="pr-2 text-muted hover:text-danger transition-colors text-sm leading-none">&times;</button>';
        html += '</span>';
      });
      html += '</div>';
      el.innerHTML = html;
    }

    // -----------------------------------------------------------------------
    // Best riding window finder
    // -----------------------------------------------------------------------
    function _findWindowForSlice(slice) {
      if (!slice || slice.length < 1) return null;
      var scores = slice.map(function (h) {
        return scoreHourly(h.feels_like, h.wind_gusts_kmh, h.precipitation_mm, h.weather_code);
      });
      var bestAvg = -1, bestStart = -1, bestLen = 0;
      for (var i = 0; i < scores.length; i++) {
        if (scores[i] < 45) continue;
        var j = i;
        while (j < scores.length && scores[j] >= 45) j++;
        var len = j - i;
        var sum = 0; for (var k = i; k < j; k++) sum += scores[k];
        var avg = sum / len;
        if (avg > bestAvg || (avg === bestAvg && len > bestLen)) {
          bestAvg = avg; bestStart = i; bestLen = len;
        }
        i = j - 1;
      }
      if (bestStart === -1) return null;
      var from = slice[bestStart];
      var to = slice[Math.min(bestStart + bestLen - 1, slice.length - 1)];
      return {
        avg: Math.round(bestAvg), len: bestLen,
        fromH: new Date(from.time).getHours().toString().padStart(2, "0") + ":00",
        toH: new Date(to.time).getHours().toString().padStart(2, "0") + ":00",
      };
    }
    function findBestWindow(hourly) {
      if (!hourly || hourly.length < 2) return null;
      var now = new Date();
      var today = now.toISOString().slice(0, 10);
      var todayH = hourly.filter(function (h) { return h.time.startsWith(today) && new Date(h.time) >= now; });
      return _findWindowForSlice(todayH);
    }
    function findTomorrowWindow(hourly) {
      if (!hourly || hourly.length < 2) return null;
      var tomorrow = new Date(); tomorrow.setDate(tomorrow.getDate() + 1);
      var tomorrowStr = tomorrow.toISOString().slice(0, 10);
      var slice = hourly.filter(function (h) { return h.time.startsWith(tomorrowStr); });
      return _findWindowForSlice(slice);
    }

    // -----------------------------------------------------------------------
    async function searchCity() {
      var q = document.getElementById("city-in").value.trim();
      if (!q) return;
      try {
        var geo;
        if (API_URL === null) {
          geo = await geocodeDirect(q);
        } else {
          var r;
          try { r = await fetch(API_URL + "/geocode?city=" + encodeURIComponent(q)); }
          catch (_) { throw new Error(BACKEND_UNAVAILABLE_MSG); }
          if (!r.ok) {
            var errMsg = "HTTP " + r.status;
            try { var ed = await r.json(); errMsg = ed.detail || errMsg; } catch (_) { }
            throw new Error(errMsg);
          }
          geo = await r.json();
        }
        LAT = geo.lat; LON = geo.lon;
        CITY = geo.name + (geo.country && geo.country !== "RO" ? ", " + geo.country : "");
        saveCity(); renderFavsBar();
        loadWeather();
      } catch (e) { alert("Eroare geocoding: " + e.message); }
    }

    document.getElementById("city-in").addEventListener("keydown", function (e) { if (e.key === "Enter") searchCity(); });

    async function loadWeather() {
      document.getElementById("app").innerHTML = skeletonHtml();
      try {
        var d;
        if (API_URL === null) {
          // No backend configured — call Open-Meteo directly from the browser
          d = await fetchDirect(LAT, LON, CITY);
        } else {
          var url = API_URL + "/weather?lat=" + LAT + "&lon=" + LON + "&city=" + encodeURIComponent(CITY);
          var res;
          try { res = await fetch(url); }
          catch (_) { throw new Error(BACKEND_UNAVAILABLE_MSG); }
          if (!res.ok) {
            var errMsg = "HTTP " + res.status;
            try { var ed = await res.json(); errMsg = ed.detail || errMsg; } catch (_) { }
            throw new Error(errMsg);
          }
          d = await res.json();
        }
        render(d);
        saveCity(); renderFavsBar();
        document.getElementById("upd").innerHTML =
          'ACTUALIZAT: ' + new Date().toLocaleTimeString("ro-RO", { hour: "2-digit", minute: "2-digit" })
          + ' &nbsp;<span id="refresh-pill" class="refresh-pill text-muted cursor-pointer" onclick="loadWeather()" title="Refresh acum">↻ auto în 30m</span>';
        startAutoRefresh();
      } catch (e) {
        document.getElementById("app").innerHTML =
          '<div class="mt-4 p-5 rounded-xl border border-danger bg-danger/10 text-danger text-base font-semibold">'
          + '⚠️ Eroare la încărcare: ' + e.message
          + '</div>'
          + '<button onclick="loadWeather()" class="mt-4 bg-accent hover:bg-orange-400 text-black font-display font-bold'
          + ' tracking-wider px-6 py-2 rounded-lg transition-colors">RETRY</button>';
      }
    }

    function setBackendUrl() {
      var el = document.getElementById('backend-url-cfg');
      var val = el ? el.value.trim().replace(/\/$/, '') : '';
      if (val) {
        try { new URL(val); } catch (_) { alert("URL invalid. Introdu o adresă completă, ex: https://your-app.up.railway.app"); return; }
        localStorage.setItem('motoMeteoBackendUrl', val); API_URL = val;
      } else { localStorage.removeItem('motoMeteoBackendUrl'); API_URL = _resolveApiUrl(); }
      loadWeather();
    }

    function clearBackendUrl() {
      localStorage.removeItem('motoMeteoBackendUrl');
      API_URL = _resolveApiUrl();
      loadWeather();
    }

      });

      _chart = new Chart(canvas, {
        type: "line",
        data: {
          labels: labels,
          datasets: [
            {
              label: "Temperatură (°C)", data: hourly.map(function (h) { return h.temperature != null ? Math.round(h.temperature * 10) / 10 : null; }),
              borderColor: "#f97316", backgroundColor: "rgba(249,115,22,0.10)", tension: 0.4, pointRadius: 3, yAxisID: "y"
            },
            {

            },

            },
            {

              borderColor: "#3b82f6", backgroundColor: "rgba(59,130,246,0.12)", tension: 0.4, pointRadius: 0, yAxisID: "y2", fill: true
            }
          ]
        },
        options: {

          plugins: { legend: { labels: { color: "#9ca3af", font: { family: "Inter", size: 11 }, boxWidth: 14, padding: 12 } } },
          scales: {

            y: {

            },

              ticks: { color: "#60a5fa", font: { size: 11 } }, grid: { drawOnChartArea: false },
              title: { display: true, text: "%", color: "#60a5fa", font: { size: 12 } }
            },
            y3: {

    }

    function render(d) {
      var c = d.current;
      var now = new Date();
      var si = scoreInfo(c.moto_score);
      var hourly = d.hourly.filter(function (h) { return new Date(h.time) >= now; }).slice(0, 24);
      var daily = d.daily;
      var allMin = Math.min.apply(null, daily.map(function (x) { return x.temp_min; }));
      var allMax = Math.max.apply(null, daily.map(function (x) { return x.temp_max; }));
      var html = '';

      // Frost / ice risk alert banner
      if (c.frost_risk || c.feels_like < 3) {
        var iceMsg = c.frost_risk
          ? '🧊 <strong>RISC DE GHEĄȞĂ / ÎNGHEȞ</strong> — umiditate ridicată + temperaturi sub 4°C. Suprafețe alunecoase posibile.'
          : '🥶 <strong>TEMPERATURI RESIMȞITE FOARTE SCĂZUTE</strong> — îmbracă-te corespunzător.';
        html += '<div class="mb-5 p-4 rounded-xl border border-danger bg-danger/10 text-danger text-sm flex items-center gap-3">'
          + '<div>' + iceMsg + '</div></div>';
      }

      // Best riding window banners (today + tomorrow)
      var win = findBestWindow(d.hourly);
      var winTom = findTomorrowWindow(d.hourly);
      if (win || winTom) {
        var _wBanner = function (w, label) {
          var wBorderCls = w.avg >= 80 ? 'border-ok' : w.avg >= 60 ? 'border-accent' : 'border-warn';
          var wTextCls = w.avg >= 80 ? 'text-ok' : w.avg >= 60 ? 'text-accent' : 'text-warn';
          var wBgCls = w.avg >= 80 ? 'bg-ok/5' : w.avg >= 60 ? 'bg-accent/5' : 'bg-warn/5';
          return '<div class="mb-3 p-4 rounded-xl border ' + wBorderCls + ' ' + wBgCls + ' flex items-center gap-4">'
            + '<span class="text-3xl flex-shrink-0">🎯</span>'
            + '<div class="flex-1">'
            + '<div class="font-display text-lg font-bold tracking-wide ' + wTextCls + '">'
            + label + ': ' + w.fromH + ' – ' + w.toH + '</div>'
            + '<div class="text-xs text-muted mt-0.5">Scor mediu <strong class="' + wTextCls + '">' + w.avg + '/100</strong>'
            + ' &middot; ' + w.len + 'h consecutiv de condiții bune'
            + (w.avg >= 80 ? ' &middot; <span class="text-ok">Condiții ideale! 🏍️</span>' : '') + '</div>'
            + '</div>'
            + '<div class="flex-shrink-0 font-display text-2xl font-bold ' + wTextCls + '">' + w.avg + '</div>'
            + '</div>';
        };
        if (win) html += _wBanner(win, 'FEREASTRĂ OPTIMĂ AZI');
        if (winTom) html += _wBanner(winTom, 'FEREASTRĂ OPTIMĂ MÂINE');
      }

      // Location
      html += '<div class="mb-6">';
      html += '<h1 class="font-display text-5xl sm:text-6xl font-bold tracking-widest leading-none text-gray-100">' + d.city.toUpperCase() + '</h1>';
      html += '<p class="text-sm text-muted tracking-widest mt-1">' + d.latitude.toFixed(4) + '° N &nbsp;·&nbsp; ' + d.longitude.toFixed(4) + '° E &nbsp;·&nbsp; ' + d.timezone + '</p>';
      html += '</div>';

      // Hero card
      html += '<div class="bg-card border border-border rounded-2xl p-6 mb-6 flex flex-col sm:flex-row items-center gap-6" style="border-left:5px solid ' + si.color + '">';
      html += '<div class="relative flex-shrink-0 flex items-center justify-center w-40 h-40 ' + gaugeGlowCls(c.moto_score) + '">';
      html += gaugeHtml(c.moto_score, si.color);
      html += '<div class="absolute inset-0 flex flex-col items-center justify-center">';
      html += '<span class="font-display text-5xl font-bold leading-none" style="color:' + si.color + '">' + c.moto_score + '</span>';
      html += '<span class="text-xs text-muted tracking-wider mt-1">/ 100</span>';
      html += '</div></div>';
      html += '<div class="flex-1 text-center sm:text-left">';
      html += '<div style="font-size:6rem;line-height:1" class="mb-2">' + c.icon + '</div>';
      html += '<div class="font-display text-3xl sm:text-4xl font-bold tracking-wide mb-1" style="color:' + si.color + '">' + si.label + '</div>';
      html += '<div class="text-base text-gray-300 mb-3">' + si.msg + '</div>';
      html += '<div class="flex flex-wrap gap-3 text-sm text-muted justify-center sm:justify-start">';
      html += '<span class="bg-bg/60 rounded-lg px-3 py-1 border border-border">' + c.description + '</span>';
      html += '<span class="bg-bg/60 rounded-lg px-3 py-1 border border-border">🌡️ Resimțit <strong class="text-gray-200">' + Math.round(c.feels_like) + '°C</strong></span>';
      html += '<span class="bg-bg/60 rounded-lg px-3 py-1 border border-border">💨 Rafale <strong class="text-gray-200">' + Math.round(c.wind_gusts_kmh) + ' km/h</strong></span>';
      if (c.sources && c.sources.length > 0) {
        html += '<span class="bg-ok/10 rounded-lg px-3 py-1 border border-ok/20 text-ok text-xs">⬆ ' + c.sources.join(' + ') + '</span>';
      }
      html += '</div></div></div>';

      // Stats grid
      html += secTitle('Condiții actuale');
      html += '<div class="grid grid-cols-2 sm:grid-cols-3 lg:grid-cols-4 gap-3 mb-2">';
      html += statCard('🌡️', 'Temperatură', Math.round(c.temperature) + '°', tempCls(c.temperature), 'resimțit ' + Math.round(c.feels_like) + '°C');
      html += statCard('💨', 'Vânt', Math.round(c.wind_speed_kmh) + '<span class="text-lg"> km/h</span>', windCls(c.wind_gusts_kmh),
        windCompassSvg(c.wind_direction_deg) + ' <span class="font-semibold text-gray-300">' + c.wind_direction + '</span>'
        + ' · rafale <strong>' + Math.round(c.wind_gusts_kmh) + ' km/h</strong> · Bf ' + c.beaufort);
      html += statCard('🌧️', 'Precipitații', c.precipitation_mm.toFixed(1) + '<span class="text-xl"> mm</span>', (c.precipitation_mm > 1 ? 'text-danger' : c.precipitation_mm > 0.1 ? 'text-warn' : 'text-ok'), 'mm / oră curentă');
      html += statCard('💧', 'Umiditate', c.humidity + '<span class="text-xl">%</span>', (c.humidity > 90 ? 'text-warn' : 'text-gray-100'), 'drum potențial umed');
      if (c.pressure_hpa != null)
        html += statCard('🔵', 'Presiune', Math.round(c.pressure_hpa) + '<span class="text-xl"> hPa</span>', 'text-gray-100', 'presiune atmosferică');
      if (c.visibility_km != null)
        html += statCard('👁️', 'Vizibilitate', c.visibility_km + '<span class="text-xl"> km</span>', (c.visibility_km < 1 ? 'text-danger' : c.visibility_km < 5 ? 'text-warn' : 'text-gray-100'), 'distanța de vizibilitate');
      if (c.aqi != null)
        html += statCard('🍃', 'Calitate aer', c.aqi, aqiCls(c.aqi), aqiLabel(c.aqi));
      if (c.uv_index != null)
        html += statCard('☀️', 'Indice UV', c.uv_index.toFixed(1), uvCls(c.uv_index), uvDesc(c.uv_index));
      if (daily.length && daily[0].sunrise)
        html += statCard('🌅', 'Răsărit', fmtTime(daily[0].sunrise), 'text-gray-100', 'ora răsăritului soarelui');
      if (daily.length && daily[0].sunset)
        html += statCard('🌇', 'Apus', fmtTime(daily[0].sunset), 'text-gray-100', 'ora apusului soarelui');
      html += '</div>';

      // Chart
      html += secTitle('Grafic temperatură, vânt &amp; ploaie — 24h');
      html += '<div class="bg-card border border-border rounded-xl p-4 mb-2" style="height:220px;">';
      html += '<canvas id="tempChart"></canvas></div>';

      // Hourly scroll
      html += secTitle('Orar — 24h');
      html += '<div class="flex gap-3 overflow-x-auto scroll-x pb-2 mb-2">';
      hourly.forEach(function (h, idx) {
        var t = new Date(h.time);
        var hh = t.getHours().toString().padStart(2, "0") + ":00";
        var rp = h.precipitation_probability || 0;
        var hs = scoreHourly(h.feels_like, h.wind_gusts_kmh, h.precipitation_mm, h.weather_code);
        var scoreColor = hs >= 80 ? '#22c55e' : hs >= 60 ? '#f97316' : hs >= 40 ? '#eab308' : '#ef4444';
        var borderCol = hs < 40 ? "border-danger" : rp > 40 ? "border-warn" : idx === 0 ? "border-accent" : "border-border";
        var nowClass = idx === 0 ? "hourly-now border-accent" : "";
        html += '<div class="flex-shrink-0 bg-card border ' + borderCol + ' ' + nowClass + ' rounded-xl p-3 w-24 text-center flex flex-col items-center gap-1">';
        html += '<div class="text-xs font-semibold tracking-widest ' + (idx === 0 ? 'text-accent' : 'text-muted') + '">' + (idx === 0 ? "ACUM" : hh) + '</div>';
        html += '<div style="font-size:2.5rem;line-height:1">' + h.icon + '</div>';
        html += '<div class="font-display text-3xl font-bold leading-none text-gray-100">' + Math.round(h.temperature) + '°</div>';
        html += '<div class="text-xs ' + rainCls(rp) + '">' + rp + '% 💧</div>';
        html += '<div class="text-xs text-muted">' + Math.round(h.wind_speed_kmh) + ' km/h</div>';
        if (h.uv_index != null && h.uv_index > 0)
          html += '<div class="text-xs ' + uvCls(h.uv_index) + '">UV ' + h.uv_index.toFixed(0) + '</div>';
        // Moto score bar + label
        html += '<div class="mt-2 w-full score-bar-track">'
          + '<div class="score-bar-fill" style="width:' + hs + '%;background:' + scoreColor + '"></div>'
          + '</div>';
        html += '<div class="text-xs font-bold" style="color:' + scoreColor + '">' + hs + '</div>';
        html += '</div>';
      });
      html += '</div>';

      // Daily forecast — responsive + expandable
      html += secTitle('Prognoză ' + daily.length + ' zile');
      html += '<div class="flex flex-col gap-2 mb-8">';
      daily.forEach(function (day, i) {
        var date = new Date(day.date + "T12:00:00");
        var dname = i === 0 ? "AZI" : (i === 1 ? "MÂINE" : DAYS[date.getDay()]);
        var tMin = Math.round(day.temp_min);
        var tMax = Math.round(day.temp_max);
        var fMin = day.feels_min != null ? Math.round(day.feels_min) : null;
        var fMax = day.feels_max != null ? Math.round(day.feels_max) : null;
        var rp = day.precipitation_probability || 0;
        var gustMax = Math.round(day.wind_gusts_kmh || 0);
        var ds = day.moto_score;
        var scoreColor = ds >= 80 ? '#22c55e' : ds >= 60 ? '#f97316' : ds >= 40 ? '#eab308' : '#ef4444';
        var borderCol = ds < 40 ? "border-l-danger" : ds < 65 ? "border-l-warn" : "border-l-ok";
        var range = allMax - allMin || 1;
        var bL = Math.round(((tMin - allMin) / range) * 100);
        var bW = Math.max(4, Math.round(((tMax - allMin) / range) * 100) - bL);

        // Wrapper
        html += '<div class="bg-card border border-border border-l-4 ' + borderCol + ' rounded-xl overflow-hidden">';

        // ── Clickable summary row ──────────────────────────────────────────
        html += '<div onclick="toggleDay(' + i + ')" class="px-3 sm:px-4 py-3 flex items-center gap-1.5 sm:gap-3 cursor-pointer select-none">';

        // Icon
        html += '<div class="flex-shrink-0 w-8 sm:w-10 text-center" style="font-size:1.75rem;line-height:1" title="' + day.description + '">' + day.icon + '</div>';

        // Day name + date
        html += '<div class="flex-shrink-0 w-14 sm:w-20">'
          + '<div class="font-display text-sm sm:text-lg font-bold tracking-wide text-gray-100">' + dname + '</div>'
          + '<div class="text-xs text-muted">' + date.toLocaleDateString("ro-RO", { day: "numeric", month: "short" }) + '</div>'
          + '</div>';

        // Temp range bar (flexible)
        html += '<div class="flex-1 min-w-0">'
          + '<div class="flex items-center gap-1">'
          + '<span class="text-xs text-muted flex-shrink-0 w-6 text-right">' + tMin + '°</span>'
          + '<div class="flex-1 h-1.5 bg-border rounded-full overflow-hidden">'
          + '<div class="h-full rounded-full" style="margin-left:' + bL + '%;width:' + bW + '%;background:linear-gradient(90deg,#60a5fa,#f97316)"></div>'
          + '</div>'
          + '<span class="text-xs text-gray-200 flex-shrink-0 w-6">' + tMax + '°</span>'
          + '</div>'
          + (fMin != null ? '<div class="text-xs text-muted mt-0.5 pl-7 hidden sm:block">resimțit ' + fMin + '° – ' + fMax + '°</div>' : '')
          + '</div>';

        // Rain %
        html += '<div class="flex-shrink-0 text-center w-9 sm:w-14">'
          + '<div class="font-display text-sm sm:text-xl font-bold ' + rainCls(rp) + '">' + rp + '%</div>'
          + '<div class="text-xs text-muted hidden sm:block">PLOAIE</div>'
          + '</div>';

        // Wind (hidden on mobile/tablet, shown on lg+)
        html += '<div class="hidden lg:block flex-shrink-0 text-center w-14">'
          + '<div class="font-display text-xl font-bold ' + windCls(gustMax) + '">' + gustMax + '</div>'
          + '<div class="text-xs text-muted">KM/H</div>'
          + '</div>';

        // Score + verdict
        html += '<div class="flex-shrink-0 flex flex-col items-center gap-0.5 min-w-0">'
          + '<div class="font-display text-sm font-bold" style="color:' + scoreColor + '">' + ds + '</div>'
          + verdictBadge(ds)
          + '</div>';

        // Arrow
        html += '<span id="arr-' + i + '" class="day-arrow flex-shrink-0">▼</span>';

        html += '</div>'; // end summary row

        // ── Expandable details ─────────────────────────────────────────────
        var dayHourly = d.hourly.filter(function (h) { return h.time.startsWith(day.date); });
        html += '<div id="det-' + i + '" class="hidden border-t border-border bg-bg/40">';

        // Hourly mini-cards
        if (dayHourly.length) {
          html += '<div class="flex gap-2 overflow-x-auto scroll-x px-3 py-3 pb-2">';
          dayHourly.forEach(function (h) {
            var ht = new Date(h.time).getHours().toString().padStart(2, "0") + ":00";
            var hrp = h.precipitation_probability || 0;
            var hsc = scoreHourly(h.feels_like, h.wind_gusts_kmh, h.precipitation_mm, h.weather_code);
            var hCol = hsc >= 80 ? '#22c55e' : hsc >= 60 ? '#f97316' : hsc >= 40 ? '#eab308' : '#ef4444';
            html += '<div class="flex-shrink-0 bg-card border border-border rounded-xl p-2 w-16 text-center flex flex-col items-center gap-0.5">';
            html += '<div class="text-xs text-muted font-semibold">' + ht + '</div>';
            html += '<div style="font-size:1.5rem;line-height:1.2">' + h.icon + '</div>';
            html += '<div class="font-display text-lg font-bold leading-none text-gray-100">' + Math.round(h.temperature) + '°</div>';
            if (h.feels_like != null) html += '<div class="text-xs text-muted">res ' + Math.round(h.feels_like) + '°</div>';
            html += '<div class="text-xs ' + rainCls(hrp) + '">' + hrp + '%💧</div>';
            html += '<div class="text-xs text-muted">' + Math.round(h.wind_speed_kmh) + 'km/h</div>';
            if (h.wind_gusts_kmh != null && h.wind_gusts_kmh > h.wind_speed_kmh + 5)
              html += '<div class="text-xs ' + windCls(h.wind_gusts_kmh) + '">↑' + Math.round(h.wind_gusts_kmh) + '</div>';
            html += '<div class="mt-1 w-full score-bar-track"><div class="score-bar-fill" style="width:' + hsc + '%;background:' + hCol + '"></div></div>';
            html += '<div class="text-xs font-bold" style="color:' + hCol + '">' + hsc + '</div>';
            html += '</div>';
          });
          html += '</div>';
        }

        // Summary pills row
        html += '<div class="flex flex-wrap gap-x-4 gap-y-1 px-3 pb-3 text-xs text-muted">';
        if (fMin != null) html += '<span>🌡️ resimțit <strong class="text-gray-300">' + fMin + '° – ' + fMax + '°</strong></span>';
        if (gustMax) html += '<span>💨 rafale max <strong class="' + windCls(gustMax) + '">' + gustMax + ' km/h</strong></span>';
        if (day.precipitation_mm > 0) html += '<span>🌧️ precipitații <strong class="text-gray-300">' + day.precipitation_mm + ' mm</strong></span>';
        if (day.sunrise) html += '<span>🌅 răsărit <strong class="text-gray-300">' + fmtTime(day.sunrise) + '</strong></span>';
        if (day.sunset) html += '<span>🌇 apus <strong class="text-gray-300">' + fmtTime(day.sunset) + '</strong></span>';
        html += '</div>';

        html += '</div>'; // end details
        html += '</div>'; // end wrapper
      });
      html += '</div>';

      html += '<div class="border-t border-border pt-4 pb-8 text-xs text-muted tracking-widest text-center">'
        + '<div>DATE: OPEN-METEO.COM &middot; OPENWEATHERMAP &middot; MET NORWAY (ECMWF)</div>'
        + '<div class="mt-1 text-muted/60">Datele sunt media ponderată a ' + (c.sources ? c.sources.length : 1) + ' surse &middot; Actualizat la fiecare 30 min automat</div>'
        + '</div>';

      document.getElementById("app").innerHTML = html;
      renderChart(hourly);
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('sw.js').catch(function () { });
    }
    renderFavsBar();
    loadWeather();
  </script>

</body>

</html>
